<div class="app-layout">
  
  <aside class="sidebar">
    <h2>Kreator</h2>
    
    <div class="form-group">
      <label>Tekst główny (Koło):</label>
      <input type="text" [(ngModel)]="mainInput" maxlength="60" placeholder="Max 60 znaków...">
      <small>{{ mainInput.length }}/60</small>
    </div>

    <button class="btn-primary" (click)="addCircle()">Dodaj Krok Prosty (Koło)</button>

    <hr class="separator">

    <div class="form-group">
      <label>Teksty podrzędne (Prostokąty):</label>

      <input [(ngModel)]="rect1" maxlength="100" placeholder="Prostokąt 1">
      <input [(ngModel)]="rect2" maxlength="100" placeholder="Prostokąt 2">
      <input [(ngModel)]="rect3" maxlength="100" placeholder="Prostokąt 3">
      <small>Max 100 znaków na prostokąt</small>
    </div>

    <button class="btn-secondary" (click)="addComplex()">Dodaj Krok Złożony</button>
  </aside>

  <main class="diagram-area">
    <app-work-flow [steps]="workflowSteps"></app-work-flow>
  </main>

</div>s
