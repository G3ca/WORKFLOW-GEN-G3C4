<div class="app-layout">
  
  <aside class="sidebar" [class.sidebar-closed]="!isSidebarOpen">
    <h2>Kreator</h2>
    
    <h3>Plik</h3>
    <button class="btn-action" (click)="saveWorkflow()">💾 Zapisz Diagram</button>
    
    <label class="btn-action">
      📂 Wczytaj Diagram
      <input type="file" #fileInput style="display: none;" accept=".json" (change)="loadWorkflow($event)">
    </label>
    
    <button class="btn-action" (click)="exportToSVG()">🖼️ Eksportuj SVG</button>

    <hr class="separator">
    
    <p style="font-size: 12px; color: #666; margin-top: 20px;">
    Edytuj diagram klikając bezpośrednio na elementy.
    </p>

  </aside>

  <main class="diagram-area">
    
    <button class="toggle-sidebar-btn" (click)="toggleSidebar()" title="Pokaż/Ukryj menu">
      {{ isSidebarOpen ? '◀' : '▶' }}
    </button>

    <div id="diagram-content" style="width: 100%; height: 100%;">
        <app-work-flow [steps]="workflowSteps"></app-work-flow>
    </div>
  </main>

</div>
